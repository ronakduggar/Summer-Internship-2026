<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Image Gallery</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 30px;
      }

      h1 {
        text-align: center;
        margin-bottom: 30px;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }

      .image-box {
        overflow: hidden;
        border-radius: 10px;
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
      }

      .image-box img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        display: block;
        transition: 0.3s;
      }

      .image-box img:hover {
        transform: scale(1.1);
      }

      @media (max-width: 768px) {
        .gallery {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 480px) {
        body {
          padding: 15px;
        }

        .gallery {
          grid-template-columns: 1fr;
        }

        .image-box img {
          height: 220px;
        }
      }
    </style>
  </head>
  <body>
    <h1>Responsive Image Gallery</h1>

    <div class="gallery">
      <div class="image-box">
        <img src="https://picsum.photos/400/300?random=1" alt="Image 1" />
      </div>

      <div class="image-box">
        <img src="https://picsum.photos/400/300?random=2" alt="Image 2" />
      </div>

      <div class="image-box">
        <img src="https://picsum.photos/400/300?random=3" alt="Image 3" />
      </div>

      <div class="image-box">
        <img src="https://picsum.photos/400/300?random=4" alt="Image 4" />
      </div>

      <div class="image-box">
        <img src="https://picsum.photos/400/300?random=5" alt="Image 5" />
      </div>

      <div class="image-box">
        <img src="https://picsum.photos/400/300?random=6" alt="Image 6" />
      </div>

      <div class="image-box">
        <img src="https://picsum.photos/400/300?random=7" alt="Image 7" />
      </div>

      <div class="image-box">
        <img src="https://picsum.photos/400/300?random=8" alt="Image 8" />
      </div>

      <div class="image-box">
        <img src="https://picsum.photos/400/300?random=9" alt="Image 9" />
      </div>
    </div>
  </body>
</html>
