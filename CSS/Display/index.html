<!doctype html>
<html>
  <head>
    <style>
      .block {
        display: block;
        background-color: lightblue;
        margin: 5px;
      }

      .inline {
        display: inline;
        background-color: lightgreen;
      }

      .inlineblock {
        display: inline-block;
        width: 120px;
        height: 50px;
        background-color: orange;
        margin: 5px;
      }
    </style>
  </head>
  <body>
    <h2>Display: Block</h2>

    <div class="block">HTML</div>
    <div class="block">CSS</div>
    <div class="block">JavaScript</div>

    <hr />

    <h2>Display: Inline</h2>

    <div class="inline">HTML</div>
    <div class="inline">CSS</div>
    <div class="inline">JavaScript</div>

    <hr />

    <h2>Display: Inline-Block</h2>

    <div class="inlineblock">HTML</div>
    <div class="inlineblock">CSS</div>
    <div class="inlineblock">JavaScript</div>
  </body>
</html>
