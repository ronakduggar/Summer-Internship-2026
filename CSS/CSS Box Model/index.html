<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Box Model</title>
    <style>
      div {
        height: 200px;
        width: 200px;
      }
      p {
        margin: 0;
      }
      .box1 {
        background-color: cadetblue;
        padding: 20px;
        border: 10px solid black;
      }
      .box2 {
        background-color: gold;
        border: 10px solid black;
        border-width: 20px 10px;
        margin-left: 260px;
      }
      .box3 {
        background-color: indianred;
        border: 10px solid black;
        margin-left: 40px;
      }
    </style>
  </head>

  <body>
    <div class="box1">
      <p>
        Lorem ipsum dolor sit amet consectetur, adipisicing elit. Esse rerum
        ipsum atque excepturi quos facilis hic sunt fugiat quibusdam minima
        numquam illo, libero rem veritatis pariatur facere qui. Reiciendis,
        soluta?
      </p>
    </div>
    <div class="box2"></div>
    <div class="box3"></div>
  </body>
</html>
